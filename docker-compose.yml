services:
  openswarm-trading-desk:
    build: .
    container_name: openswarm-trading-desk
    restart: unless-stopped
    ports:
      - "${OPENSWARM_HOST_PORT:-18080}:${OPENSWARM_PORT:-18080}"
    env_file:
      - .env
    environment:
      OPENSWARM_HOST: 0.0.0.0
      OPENSWARM_PORT: ${OPENSWARM_PORT:-18080}
      OPENSWARM_SERVICE_ROLE: analysis_only
    volumes:
      - ./activity-logs:/app/activity-logs
      - ./mnt:/app/mnt
      - ./uploads:/app/uploads

  openswarm-telegram-bot:
    build: .
    container_name: openswarm-telegram-bot
    restart: unless-stopped
    profiles:
      - telegram
    env_file:
      - .env
    environment:
      OPENSWARM_BASE_URL: http://openswarm-trading-desk:${OPENSWARM_PORT:-18080}
      OPENSWARM_TELEGRAM_RECIPIENT_AGENT: Portfolio Manager
    command: ["python", "-u", "telegram_bot.py"]
    depends_on:
      - openswarm-trading-desk

networks:
  default:
    ipam:
      config:
        - subnet: ${OPENSWARM_DOCKER_SUBNET:-172.16.2.0/24}
          gateway: ${OPENSWARM_DOCKER_GATEWAY:-172.16.2.1}
